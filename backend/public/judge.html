<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech-Fusion | Judge Dashboard</title>
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #050a18;
      min-height: 100vh;
      color: #f0f4ff;
    }
    .judge-wrapper {
      position: relative;
      z-index: 10;
      padding: 40px 20px;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(10, 17, 40, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(96, 165, 250, 0.1);
      border-radius: 16px;
    }
    .judge-title h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .judge-controls {
      display: flex;
      gap: 12px;
    }
    .btn-judge {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-export {
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.2);
    }
    .btn-export:hover {
      background: rgba(96, 165, 250, 0.2);
      border-color: #60a5fa;
    }
    .btn-logout {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: #ef4444;
    }

    .leaderboard-container {
      background: rgba(12, 20, 50, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(96, 165, 250, 0.1);
      border-radius: 20px;
      overflow: hidden;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      text-align: left;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      color: #8892b0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .leaderboard-table td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(96, 165, 250, 0.05);
    }

    .team-row:hover {
      background: rgba(96, 165, 250, 0.03);
    }

    .team-id-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: #60a5fa;
    }

    .score-input {
      background: rgba(5, 10, 24, 0.5);
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 6px;
      padding: 6px 10px;
      color: #f0f4ff;
      font-family: 'JetBrains Mono', monospace;
      width: 80px;
      transition: all 0.3s ease;
    }

    .score-input:focus {
      border-color: #60a5fa;
      outline: none;
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
    }

    .final-score {
      font-weight: 800;
      font-size: 1.1rem;
      color: #34d399;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-active { background: rgba(52, 211, 153, 0.1); color: #34d399; }
    .badge-dq { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

    .submissions-drawer {
      background: rgba(5, 10, 24, 0.8);
      padding: 20px;
      display: none;
    }

    .submissions-flex {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .sub-card {
      min-width: 200px;
      background: rgba(12, 20, 50, 0.6);
      border: 1px solid rgba(96, 165, 250, 0.1);
      border-radius: 12px;
      padding: 12px;
      transition: transform 0.3s ease;
    }
    .sub-card:hover {
      transform: translateY(-5px);
      border-color: rgba(96, 165, 250, 0.3);
    }

    .sub-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .sub-details {
      font-size: 0.75rem;
      color: #8892b0;
      line-height: 1.5;
    }

    /* Particles Background */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <div class="judge-wrapper">
    <div class="header-bar">
      <div class="judge-title">
        <h1>JUDGE PANEL</h1>
        <p style="font-size: 0.85rem; color: #8892b0;">Think to Build Real-time Leaderboard</p>
      </div>
      <div class="judge-controls">
        <button class="btn-judge btn-export" onclick="exportPDF()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Export PDF
        </button>
        <button class="btn-judge btn-logout" onclick="logout()">
          Logout
        </button>
      </div>
    </div>

    <div class="leaderboard-container">
      <div id="leaderboard-content">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Team ID & Name</th>
              <th>Attempts</th>
              <th>Best Round 1</th>
              <th>Round 2 Score</th>
              <th>Final Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Reusing main.js particles logic with some tweaks if needed, or including directly -->
  <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>


  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/js/judge.js"></script>
</body>
</html>
