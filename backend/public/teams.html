<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech-Fusion | Team IDs</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Registered Teams</h1>
      <p>Team names with generated Team IDs</p>
    </header>

    <div class="glass-card">
      <div class="controls">
        <button id="refresh-btn" type="button" style="background: var(--surface); border: 1px solid var(--border);">Refresh</button>
        <button id="download-pdf-btn" type="button">Download PDF</button>
      </div>

      <div id="teams-pdf-content" class="pdf-sheet">
        <div class="pdf-sheet-header">
          <div>
            <h2>Tech-Fusion Team ID List</h2>
            <p id="generated-at">Generated just now</p>
          </div>
          <strong id="team-count">0 Teams</strong>
        </div>

        <div id="teams-status" class="teams-status">Loading teams...</div>

        <table class="leaderboard-table team-id-table" id="teams-table" style="display: none;">
          <thead>
            <tr>
              <th>#</th>
              <th>Team Name</th>
              <th>Generated Team ID</th>
            </tr>
          </thead>
          <tbody id="teams-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/teams.js"></script>
</body>
</html>
