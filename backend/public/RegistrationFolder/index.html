<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think to Build | Team Registration</title>
  <link rel="stylesheet" href="/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #050a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .reg-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
    }
    .reg-card {
      text-align: center;
    }
    .reg-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #60a5fa;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8892b0;
    }
    .form-input {
      width: 100%;
      background: rgba(5, 10, 24, 0.5);
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.05);
      outline: none;
      box-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
    }
    
    #success-modal h2 {
      font-family: 'Orbitron', sans-serif;
      color: #34d399;
      margin-bottom: 16px;
    }
    #generated-team-id {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      color: #34d399;
      border-radius: 12px;
      margin: 24px 0 12px 0;
      letter-spacing: 2px;
      font-weight: 700;
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.1);
      position: relative;
    }
    .copy-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8892b0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }
    .copy-btn:hover {
      background: rgba(52, 211, 153, 0.1);
      color: #34d399;
      border-color: #34d399;
    }
  </style>
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <div class="reg-wrapper">
    <!-- Registration Card -->
    <div class="glass-card reg-card" id="registration-form-card">
      <div class="reg-icon">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"></path>
        </svg>
      </div>
      <h1 style="font-family: 'Orbitron'; font-size: 1.8rem; margin-bottom: 8px;">JOIN ARENA</h1>
      <p style="color: #8892b0; margin-bottom: 32px;">Initialize your team participation profile</p>
      
      <div id="error-msg" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none;"></div>

      <form id="registration-form">
        <div class="form-group">
          <label>Participant Name</label>
          <input type="text" id="participant-name" class="form-input" placeholder="e.g. John Doe" required autofocus>
        </div>
        <div class="form-group">
          <label>Team Identity / Name</label>
          <input type="text" id="team-name" class="form-input" placeholder="e.g. CORE ANALYTICS" required>
        </div>
        <div class="form-group">
          <label>Contact Email</label>
          <input type="email" id="team-email" class="form-input" placeholder="leader@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
          <span class="btn-text">GENERATE TEAM PROFILE</span>
          <span class="btn-shine"></span>
        </button>
      </form>
      <p style="margin-top: 24px; font-size: 0.85rem;">
        <a href="/" style="color: #8892b0; text-decoration: none;">← Cancel & Return to Hub</a>
      </p>
    </div>

    <!-- Success View -->
    <div class="glass-card reg-card" style="display: none;" id="success-modal">
      <div class="reg-icon" style="color: #34d399; background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.2);">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h2>IDENTITY CREATED</h2>
      <p style="color: #8892b0;">Authentication code generated successfully. Please store this ID securely:</p>
      
      <div id="generated-team-id">TEAM-XXXXXX</div>
      <button class="copy-btn" onclick="copyId()">📋 Copy ID to Clipboard</button>
      
      <p style="color: #8892b0; font-size: 0.85rem; margin-bottom: 32px;">
        Use this code to login at the dashboard when the event begins.
      </p>

      <a href="/" class="btn btn-primary" style="display: block; text-decoration: none;">
        <span class="btn-text">RETURN TO HUB</span>
      </a>
    </div>
  </div>

  <script>
    // Particle background
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize);
      resize();
      class P {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3; this.r = Math.random()*1.5; }
        draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle = 'rgba(96, 165, 250, 0.2)'; ctx.fill(); }
        update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
      }
      for(let i=0; i<40; i++) particles.push(new P());
      function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(loop); }
      loop();
    })();

    function copyId() {
      const idText = document.getElementById('generated-team-id').innerText;
      navigator.clipboard.writeText(idText);
      const btn = document.querySelector('.copy-btn');
      btn.innerText = '✅ ID Copied!';
      setTimeout(() => { btn.innerText = '📋 Copy ID to Clipboard'; }, 2000);
    }
  </script>
  <script src="/RegistrationFolder/register.js"></script>
</body>
</html>
